name: Solar System Workflow
env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
    
jobs:
    code-coverage:
        name: Code Coverage test
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: NodeJS Version
            uses: actions/setup-node@v4
            with:
             node-version: 18

          - name: Install Dependencies
            run: npm install

          - name: Run code coverage test
            run: npm run coverage
            continue-on-error: true

          - name: Code Coverage result
            uses: actions/upload-artifact@v4
            with:
              name: Code-Coverage-Result
              path: coverage
              retention-days: 5
            
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version
          uses: actions/setup-node@v4
          with:
            node-version: 20
    
        - name: Install Dependencies
          
          run: npm install
    
        - name: Unit Testing
          env:
            MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
            MONGO_USERNAME: superuser
            MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml

    docker:
      name: Docker login
      needs: [code-coverage, unit-testing]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Docker login action
          uses: docker/login-action@v4
          with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}
       
        - name: Docker build image
          uses: docker/build-push-action@v6
          with:
            context: .
            push: false
            tags: ${{secrets.DOCKER_USERNAME}}/solar-system-test

        - name: docker image test
          run: |
           docker images
           docker run --name solar-system -d \
            -p 3000:3000 \
            -e MONGO_URI=$MONGO_URI \
            -e MONGO_USERNAME=$MONGO_USERNAME \
            -e MONGO_PASSWORD=$MONGO_PASSWORD \
            ${{secrets.DOCKER_USERNAME}}/solar-system-test
           export CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system)
           echo $CONTAINER_IP
           wget -q -O - 127.0.0.1:3000/live | grep live
