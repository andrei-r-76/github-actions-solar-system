name: Solar System Workflow
env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
    
jobs:
    code-coverage:
        name: Code Coverage test
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: NodeJS Version
            uses: actions/setup-node@v4
            with:
             node-version: 18

          - name: Install Dependencies
            run: npm install

          - name: Run code coverage test
            run: npm run coverage
            continue-on-error: true

          - name: Code Coverage result
            uses: actions/upload-artifact@v4
            with:
              name: Code-Coverage-Result
              path: coverage
              retention-days: 5
            
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        container:
          image: 'node:20'
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
        
        - name: Cache NPM dependencies
          uses: actions/cache@v5
          with:
            key: ${{runner.os}}-node-modules-${{hashFiles('package-lock.json')}}
            path: ~/.npm
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          env:
            MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
            MONGO_USERNAME: superuser
            MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml

    docker:
      name: Docker
      needs: [code-coverage, unit-testing]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Docker login action
          uses: docker/login-action@v4
          with:
            username: ${{vars.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}
       
        - name: Docker build and push image
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: andreir76/solar-system-test

        - name: docker image test
          run: |
           docker images
           docker run --name solar-system -d \
            -p 3000:3000 \
            -e MONGO_URI=$MONGO_URI \
            -e MONGO_USERNAME=$MONGO_USERNAME \
            -e MONGO_PASSWORD=$MONGO_PASSWORD \
            andreir76/solar-system-test
           export CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system)
           echo $CONTAINER_IP
           wget -q -O - 127.0.0.1:3000/live | grep live
    
    dev-deploy:
      runs-on: ubuntu-latest
      needs: docker
      environment:
        name: development
      steps:
       - name: Checkout Repository
         uses: actions/checkout@v4

       - name: Install kubernetes cluster for testing purposes
         uses: helm/kind-action@v1

       - name: Install nginx ingress controller
         run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml

       - name: create kubernetes namespace
         run: kubectl create namespace ${{vars.KUBERNETES_MANIFEST_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -

       - name: Get nginx ingress controller ports
         run: |
          echo "NGINX_80_PORT=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}')" >> $GITHUB_ENV
          echo "NGINX_443_PORT=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.spec.ports[?(@.port==443)].nodePort}')" >> $GITHUB_ENV

       - name: create mongodb secret
         run: |
          kubectl -n ${{vars.KUBERNETES_MANIFEST_NAMESPACE}} create secret generic mongo-db-creds \
          --from-literal=MONGO_URI=${{env.MONGO_URI}} \
          --from-literal=MONGO_USERNAME=${{env.MONGO_USERNAME}} \
          --from-literal=MONGO_PASSWORD=${{secrets.MONGO_PASSWORD}} \
          --save-config \
          --dry-run=client \
          -o yaml | kubectl apply -f -

       - name: Replace tokens in kubernetes yaml files
         uses: cschleiden/replace-tokens@v1
         with:
          tokenPrefix: '_{_'
          tokenSuffix: '_}_'
          files: '["kubernetes/development/*.yaml"]'
         env:
          80_PORT: ${{env.NGINX_80_PORT}}
          NAMESPACE: ${{vars.KUBERNETES_MANIFEST_NAMESPACE}}
          REPLICAS: ${{vars.KUBERNETES_MANIFEST_REPLICAS}}
          IMAGE: ${{vars.DOCKER_USERNAME}}
          INGRESS_IP: 127.0.0.1
        
       - name: apply and display kubernetes pods
         run: |
          kubectl apply -f kubernetes/${{vars.KUBERNETES_MANIFEST_NAMESPACE}}
          kubectl get all -n ${{vars.KUBERNETES_MANIFEST_NAMESPACE}}
          kubectl -n development get ing

       - name: check if tokens were replaced
         run: cat kubernetes/development/ingress.yaml
      
